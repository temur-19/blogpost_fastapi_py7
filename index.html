<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PostHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0e8;
      --surface: #fff;
      --accent: #e63946;
      --accent2: #1d3557;
      --text: #1a1a2e;
      --muted: #888;
      --border: #e0d8cc;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── AUTH SCREEN ── */
    #auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--accent2) 0%, #0d1f35 100%);
    }

    .auth-box {
      background: var(--surface);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: popIn .4s ease both;
    }

    .auth-box h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      color: var(--accent2);
      margin-bottom: 4px;
    }

    .auth-box p {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .auth-tabs {
      display: flex;
      gap: 0;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 22px;
    }

    .auth-tab {
      flex: 1;
      padding: 9px;
      text-align: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px;
      letter-spacing: 1px;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
      background: transparent;
      border: none;
    }

    .auth-tab.active {
      background: var(--accent2);
      color: #fff;
    }

    /* ── HEADER ── */
    header {
      background: var(--accent2);
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 16px rgba(0,0,0,0.18);
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      letter-spacing: 2px;
      color: #fff;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hbadge {
      background: var(--accent);
      color: #fff;
      padding: 4px 16px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 700;
    }

    /* User chip in header */
    .user-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 5px 14px 5px 6px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
    }

    .user-chip-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
    }

    .btn-logout {
      background: rgba(230,57,70,0.85);
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 99px;
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
    }

    .btn-logout:hover { background: var(--accent); }

    /* ── TABS ── */
    .tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 0 40px;
    }

    .tab {
      padding: 13px 26px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 1px;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color .2s, border-color .2s;
    }

    .tab:hover { color: var(--accent2); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── LAYOUT ── */
    .layout {
      display: grid;
      grid-template-columns: 310px 1fr;
      min-height: calc(100vh - 112px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 20px;
      position: sticky;
      top: 0;
      height: calc(100vh - 112px);
      overflow-y: auto;
    }

    .sidebar.editing { border-left: 4px solid var(--accent); }

    .sidebar h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 19px;
      letter-spacing: 1px;
      color: var(--accent2);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--accent);
    }

    /* ── FORM ── */
    .field { margin-bottom: 12px; display: flex; flex-direction: column; gap: 5px; }

    label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    input, textarea, select {
      width: 100%;
      padding: 9px 13px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: #fafaf8;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(29,53,87,.1);
    }

    textarea { resize: vertical; min-height: 88px; line-height: 1.6; }
    select { cursor: pointer; }

    .ferr {
      background: #ffeaea;
      border: 1px solid #ffb3b3;
      color: #c00;
      padding: 9px 13px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 10px;
      display: none;
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius);
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s;
      width: 100%;
    }

    .btn-primary { background: var(--accent); color: #fff; margin-bottom: 7px; }
    .btn-primary:hover { background: #c62a35; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(230,57,70,.3); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-secondary { background: var(--accent2); color: #fff; margin-bottom: 7px; }
    .btn-secondary:hover { background: #162840; transform: translateY(-1px); }
    .btn-secondary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .btn-cancel { background: #f0ede8; color: var(--muted); display: none; }
    .btn-cancel:hover { background: #e5e0d8; color: var(--text); }

    .btn-sm { width: auto; padding: 5px 12px; font-size: 12px; }
    .btn-edit   { background: #eef2ff; color: var(--accent2); }
    .btn-edit:hover   { background: #dce6ff; }
    .btn-delete { background: #fff0f0; color: var(--accent); }
    .btn-delete:hover { background: #ffe0e0; }

    /* ── CONTENT ── */
    .content { padding: 26px 30px; }

    .content-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
    }

    .content-header h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      color: var(--accent2);
    }

    .badge {
      background: var(--accent2);
      color: #fff;
      padding: 2px 11px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 700;
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(248px, 1fr));
      gap: 16px;
    }

    /* ── POST CARD ── */
    .post-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 16px;
      box-shadow: var(--shadow);
      transition: transform .2s, box-shadow .2s;
      animation: popIn .3s ease both;
    }

    .post-card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,.1); }

    @keyframes popIn {
      from { opacity: 0; transform: scale(.95) translateY(10px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }

    .post-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .post-id {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .author-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #f0f4ff;
      border: 1px solid #d0dcff;
      color: var(--accent2);
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
    }

    .author-chip-avatar {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent2);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 800;
    }

    .post-card h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: .5px;
      color: var(--accent2);
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .post-card p {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .card-actions {
      display: flex;
      gap: 7px;
      border-top: 1px solid var(--border);
      padding-top: 11px;
    }

    /* ── AUTHOR CARD ── */
    .author-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 16px 18px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 13px;
      animation: popIn .3s ease both;
      transition: transform .2s;
    }

    .author-card:hover { transform: translateY(-2px); }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--accent2);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      flex-shrink: 0;
    }

    .author-info { flex: 1; }

    .author-info h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 17px;
      letter-spacing: .5px;
      color: var(--accent2);
    }

    .author-info span { font-size: 12px; color: var(--muted); }

    /* ── STATES ── */
    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 70px 20px;
      gap: 12px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }

    .state-icon { font-size: 46px; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 22px;
      right: 22px;
      background: var(--accent2);
      color: #fff;
      padding: 11px 20px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
      transform: translateY(80px);
      opacity: 0;
      transition: all .3s ease;
      z-index: 999;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.err  { background: var(--accent); }

    /* ── TOKEN EXPIRY BANNER ── */
    .token-banner {
      display: none;
      background: #fff3cd;
      border-bottom: 1px solid #ffc107;
      color: #856404;
      padding: 8px 40px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
    }
    .token-banner.show { display: block; }

    .page { display: none; }
    .page.active { display: block; }

    /* ── APP SCREEN ── */
    #app-screen { display: none; }

    @media (max-width: 800px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
      .content { padding: 18px 14px; }
      header, .tabs { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>

<!-- ══ AUTH SCREEN ══ -->
<div id="auth-screen">
  <div class="auth-box">
    <h2>📰 PostHub</h2>
    <p>Tizimga kirish yoki ro'yxatdan o'tish</p>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="showAuthTab('login')">Kirish</button>
      <button class="auth-tab" id="tab-register" onclick="showAuthTab('register')">Ro'yxat</button>
    </div>

    <!-- LOGIN -->
    <div id="login-form">
      <div class="ferr" id="login-err"></div>
      <div class="field">
        <label>Username</label>
        <input id="login-username" type="text" placeholder="username..." autocomplete="username"/>
      </div>
      <div class="field">
        <label>Parol</label>
        <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn btn-primary" id="login-btn" onclick="doLogin()">🔑 Kirish</button>
    </div>

    <!-- REGISTER -->
    <div id="register-form" style="display:none">
      <div class="ferr" id="register-err"></div>
      <div class="field">
        <label>Username</label>
        <input id="reg-username" type="text" placeholder="username..." autocomplete="username"/>
      </div>
      <div class="field">
        <label>Parol</label>
        <input id="reg-password" type="password" placeholder="••••••••" autocomplete="new-password"/>
      </div>
      <div class="field">
        <label>Parolni tasdiqlang</label>
        <input id="reg-password2" type="password" placeholder="••••••••" autocomplete="new-password"/>
      </div>
      <button class="btn btn-secondary" id="register-btn" onclick="doRegister()">✚ Ro'yxatdan o'tish</button>
    </div>
  </div>
</div>

<!-- ══ APP SCREEN ══ -->
<div id="app-screen">

  <div class="token-banner" id="token-banner">
    ⚠️ Sessiyangiz tez orada tugaydi. Iltimos, qayta kiring.
  </div>

  <header>
    <h1>📰 PostHub</h1>
    <div class="header-right">
      <span class="hbadge" id="post-count">0 ta post</span>
      <div class="user-chip">
        <div class="user-chip-avatar" id="header-avatar">U</div>
        <span id="header-username">User</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">🚪 Chiqish</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('posts')">📝 Postlar</div>
    <div class="tab"        onclick="switchTab('authors')">👤 Mualliflar</div>
  </div>

  <div class="layout">

    <!-- ══ SIDEBAR ══ -->
    <aside class="sidebar" id="sidebar">

      <div id="post-form-wrap">
        <h2 id="post-form-title">➕ Yangi Post</h2>
        <div class="ferr" id="post-err"></div>

        <div class="field">
          <label>Sarlavha</label>
          <input id="inp-title" type="text" placeholder="Post sarlavhasi..." maxlength="50"/>
        </div>
        <div class="field">
          <label>Matn</label>
          <textarea id="inp-content" placeholder="Post matni..." maxlength="250"></textarea>
        </div>
        <div class="field">
          <label>Muallif</label>
          <select id="inp-author">
            <option value="">— Muallif tanlang —</option>
          </select>
        </div>

        <button class="btn btn-primary" id="post-btn" onclick="submitPost()">✚ Yaratish</button>
        <button class="btn btn-cancel"  id="post-cancel" onclick="cancelEdit()">✕ Bekor qilish</button>
      </div>

      <div id="author-form-wrap" style="display:none">
        <h2>👤 Yangi Muallif</h2>
        <div class="ferr" id="author-err"></div>

        <div class="field">
          <label>Ism</label>
          <input id="inp-fn" type="text" placeholder="Ism..." maxlength="100"/>
        </div>
        <div class="field">
          <label>Familiya</label>
          <input id="inp-ln" type="text" placeholder="Familiya..." maxlength="100"/>
        </div>

        <button class="btn btn-primary" onclick="submitAuthor()">✚ Qo'shish</button>
      </div>

    </aside>

    <!-- ══ CONTENT ══ -->
    <main class="content">

      <div class="page active" id="page-posts">
        <div class="content-header">
          <h2>Barcha Postlar</h2>
          <span class="badge" id="badge-posts">0</span>
        </div>
        <div id="posts-container">
          <div class="state"><div class="spinner"></div><p>Yuklanmoqda...</p></div>
        </div>
      </div>

      <div class="page" id="page-authors">
        <div class="content-header">
          <h2>Barcha Mualliflar</h2>
          <span class="badge" id="badge-authors">0</span>
        </div>
        <div id="authors-container">
          <div class="state"><div class="spinner"></div><p>Yuklanmoqda...</p></div>
        </div>
      </div>

    </main>
  </div>

</div><!-- /app-screen -->

<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:8000/api/posts';
  const AUTH_API = 'http://localhost:8000';   // /token, /register endpointlari

  let authors   = [];
  let editingId = null;
  let tokenExpiryTimer = null;

  // ════════════════════════════════════════════════
  //  TOKEN MANAGEMENT
  // ════════════════════════════════════════════════

  function saveToken(token, username) {
    localStorage.setItem('access_token', token);
    localStorage.setItem('username', username);

    // JWT payload'dan exp ni o'qish
    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      if (payload.exp) {
        const msLeft = payload.exp * 1000 - Date.now();
        scheduleTokenExpiry(msLeft);
      }
    } catch (e) { /* ignore */ }
  }

  function getToken() {
    return localStorage.getItem('access_token');
  }

  function clearToken() {
    localStorage.removeItem('access_token');
    localStorage.removeItem('username');
    if (tokenExpiryTimer) clearTimeout(tokenExpiryTimer);
  }

  // Token muddati tugashidan 2 daqiqa oldin ogohlantirish,
  // tugaganda avtomatik logout
  function scheduleTokenExpiry(msLeft) {
    if (tokenExpiryTimer) clearTimeout(tokenExpiryTimer);

    const warnAt = msLeft - 2 * 60 * 1000; // 2 daqiqa oldin
    if (warnAt > 0) {
      tokenExpiryTimer = setTimeout(() => {
        document.getElementById('token-banner').classList.add('show');
      }, warnAt);
    }

    setTimeout(() => {
      toast('⌛ Sessiya muddati tugadi. Qayta kiring.', true);
      doLogout();
    }, msLeft);
  }

  // Barcha API so'rovlar uchun Authorization headeri
  function authHeaders(extra = {}) {
    return {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${getToken()}`,
      ...extra
    };
  }

  // 401 javobni tekshirish — token eskirgan
  function handle401(res) {
    if (res.status === 401) {
      toast('🔒 Sessiya tugadi. Qayta kiring.', true);
      doLogout();
      return true;
    }
    return false;
  }

  // ════════════════════════════════════════════════
  //  AUTH SCREEN
  // ════════════════════════════════════════════════

  function showAuthTab(tab) {
    document.getElementById('login-form').style.display    = tab === 'login'    ? '' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
    document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  // Enter tuşu support
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('login-form').style.display !== 'none')
      doLogin();
    else if (document.getElementById('register-form').style.display !== 'none')
      doRegister();
  });

  async function doLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl    = document.getElementById('login-err');
    const btn      = document.getElementById('login-btn');

    if (!username || !password) {
      errEl.textContent = "Username va parolni kiriting!";
      errEl.style.display = 'block';
      return;
    }
    errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = '⏳ Kirilmoqda...';

    try {
      // OAuth2 password flow — form-urlencoded
      const res = await fetch(`${AUTH_API}/token`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ username, password })
      });

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        errEl.textContent = data.detail || "Username yoki parol noto'g'ri!";
        errEl.style.display = 'block';
        return;
      }

      const data = await res.json();
      saveToken(data.access_token, username);
      enterApp(username);

    } catch {
      errEl.textContent = "Serverga ulanib bo'lmadi!";
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = '🔑 Kirish';
    }
  }

  async function doRegister() {
    const username  = document.getElementById('reg-username').value.trim();
    const password  = document.getElementById('reg-password').value;
    const password2 = document.getElementById('reg-password2').value;
    const errEl     = document.getElementById('register-err');
    const btn       = document.getElementById('register-btn');

    if (!username || !password) {
      errEl.textContent = "Barcha maydonlarni to'ldiring!";
      errEl.style.display = 'block';
      return;
    }
    if (password !== password2) {
      errEl.textContent = "Parollar mos kelmadi!";
      errEl.style.display = 'block';
      return;
    }
    errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = '⏳ Ro\'yxatdan o\'tilmoqda...';

    try {
      const res = await fetch(`${AUTH_API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        errEl.textContent = data.detail || "Ro'yxatdan o'tishda xatolik!";
        errEl.style.display = 'block';
        return;
      }

      toast('✅ Ro\'yxatdan o\'tdingiz! Kiring.');
      showAuthTab('login');
      document.getElementById('login-username').value = username;

    } catch {
      errEl.textContent = "Serverga ulanib bo'lmadi!";
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = '✚ Ro\'yxatdan o\'tish';
    }
  }

  function enterApp(username) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display  = 'block';
    document.getElementById('header-username').textContent = username;
    document.getElementById('header-avatar').textContent   = username[0].toUpperCase();
    loadAuthors().then(() => loadPosts());
  }

  function doLogout() {
    clearToken();
    document.getElementById('token-banner').classList.remove('show');
    document.getElementById('app-screen').style.display  = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
    // formlarni tozalash
    document.getElementById('login-password').value = '';
    document.getElementById('login-err').style.display = 'none';
  }

  // ════════════════════════════════════════════════
  //  TOAST
  // ════════════════════════════════════════════════
  function toast(msg, err = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (err ? ' err' : '');
    setTimeout(() => el.className = 'toast', 3000);
  }

  // ════════════════════════════════════════════════
  //  TABS
  // ════════════════════════════════════════════════
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) =>
      t.classList.toggle('active', i === (tab === 'posts' ? 0 : 1))
    );
    document.getElementById('page-posts').classList.toggle('active', tab === 'posts');
    document.getElementById('page-authors').classList.toggle('active', tab === 'authors');
    document.getElementById('post-form-wrap').style.display   = tab === 'posts'   ? '' : 'none';
    document.getElementById('author-form-wrap').style.display = tab === 'authors' ? '' : 'none';
    if (tab === 'authors') loadAuthors();
  }

  // ════════════════════════════════════════════════
  //  AUTHORS
  // ════════════════════════════════════════════════
  async function loadAuthors() {
    try {
      const res = await fetch(`${API}/users`, { headers: authHeaders() });
      if (handle401(res)) return;
      if (!res.ok) throw new Error();
      authors = await res.json();
      renderAuthors();
      fillSelect();
    } catch {
      document.getElementById('authors-container').innerHTML =
        `<div class="state"><span class="state-icon">⚠️</span><p>Mualliflarni yuklashda xatolik.</p></div>`;
    }
  }

  function fillSelect() {
    const sel  = document.getElementById('inp-author');
    const prev = sel.value;
    sel.innerHTML = '<option value="">— Muallif tanlang —</option>';
    authors.forEach(a => {
      const o = document.createElement('option');
      o.value = a.id;
      o.textContent = `${a.first_name} ${a.last_name}`;
      sel.appendChild(o);
    });
    if (prev) sel.value = prev;
  }

  function renderAuthors() {
    document.getElementById('badge-authors').textContent = authors.length;
    if (!authors.length) {
      document.getElementById('authors-container').innerHTML =
        `<div class="state"><span class="state-icon">👤</span><p>Hali mualliflar yo'q.<br>Birinchi muallifni qo'shing!</p></div>`;
      return;
    }
    document.getElementById('authors-container').innerHTML =
      `<div class="grid">${authors.map(authorCard).join('')}</div>`;
  }

  function authorCard(a) {
    const initials = (a.first_name[0] + a.last_name[0]).toUpperCase();
    return `
      <div class="author-card">
        <div class="avatar">${esc(initials)}</div>
        <div class="author-info">
          <h3>${esc(a.first_name)} ${esc(a.last_name)}</h3>
          <span>ID: #${a.id}</span>
        </div>
        <button class="btn btn-delete btn-sm" onclick="deleteAuthor(${a.id})">🗑</button>
      </div>`;
  }

  async function submitAuthor() {
    const first_name = document.getElementById('inp-fn').value.trim();
    const last_name  = document.getElementById('inp-ln').value.trim();
    const errEl = document.getElementById('author-err');

    if (!first_name || !last_name) {
      errEl.textContent = "Ism va familiya to'ldirilishi shart!";
      errEl.style.display = 'block';
      return;
    }
    errEl.style.display = 'none';

    try {
      const res = await fetch(`${API}/users`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ first_name, last_name })
      });
      if (handle401(res)) return;
      if (!res.ok) throw new Error();
      document.getElementById('inp-fn').value = '';
      document.getElementById('inp-ln').value = '';
      toast("✅ Muallif qo'shildi!");
      loadAuthors();
    } catch {
      toast('❌ Xatolik yuz berdi!', true);
    }
  }

  async function deleteAuthor(id) {
    if (!confirm("Bu muallifni o'chirishni xohlaysizmi?")) return;
    try {
      const res = await fetch(`${API}/users/${id}`, {
        method: 'DELETE',
        headers: authHeaders()
      });
      if (handle401(res)) return;
      toast("🗑 Muallif o'chirildi!");
      loadAuthors();
    } catch {
      toast("❌ O'chirishda xatolik!", true);
    }
  }

  // ════════════════════════════════════════════════
  //  POSTS
  // ════════════════════════════════════════════════
  async function loadPosts() {
    document.getElementById('posts-container').innerHTML =
      `<div class="state"><div class="spinner"></div><p>Yuklanmoqda...</p></div>`;
    try {
      const res = await fetch(`${API}/`, { headers: authHeaders() });
      if (handle401(res)) return;
      if (!res.ok) throw new Error();
      renderPosts(await res.json());
    } catch {
      document.getElementById('posts-container').innerHTML =
        `<div class="state">
          <span class="state-icon">⚠️</span>
          <p>Serverga ulanib bo'lmadi.<br><b>fastapi dev main.py</b> ishga tushiring.</p>
        </div>`;
    }
  }

  function getAuthor(id) {
    return authors.find(a => a.id === id);
  }

  function renderPosts(posts) {
    document.getElementById('post-count').textContent  = `${posts.length} ta post`;
    document.getElementById('badge-posts').textContent = posts.length;
    if (!posts.length) {
      document.getElementById('posts-container').innerHTML =
        `<div class="state"><span class="state-icon">📭</span><p>Hali postlar yo'q.<br>Birinchi postni yarating!</p></div>`;
      return;
    }
    document.getElementById('posts-container').innerHTML =
      `<div class="grid">${posts.map(postCard).join('')}</div>`;
  }

  function postCard(p) {
    const a        = getAuthor(p.author_id);
    const name     = a ? `${a.first_name} ${a.last_name}` : `#${p.author_id}`;
    const initials = a ? (a.first_name[0] + a.last_name[0]).toUpperCase() : '?';
    return `
      <div class="post-card">
        <div class="post-top">
          <span class="post-id">#${p.id}</span>
          <span class="author-chip">
            <span class="author-chip-avatar">${esc(initials)}</span>
            ${esc(name)}
          </span>
        </div>
        <h3>${esc(p.title)}</h3>
        <p>${esc(p.content)}</p>
        <div class="card-actions">
          <button class="btn btn-edit btn-sm"
            onclick="startEdit(${p.id}, \`${escJs(p.title)}\`, \`${escJs(p.content)}\`, ${p.author_id})">
            ✏️ Tahrirlash
          </button>
          <button class="btn btn-delete btn-sm" onclick="deletePost(${p.id})">
            🗑 O'chirish
          </button>
        </div>
      </div>`;
  }

  async function submitPost() {
    const title     = document.getElementById('inp-title').value.trim();
    const content   = document.getElementById('inp-content').value.trim();
    const author_id = document.getElementById('inp-author').value;
    const errEl     = document.getElementById('post-err');
    const btn       = document.getElementById('post-btn');

    if (!title || !content || !author_id) {
      errEl.textContent   = "Barcha maydonlarni to'ldiring!";
      errEl.style.display = 'block';
      return;
    }
    errEl.style.display = 'none';
    btn.disabled    = true;
    btn.textContent = '⏳ Saqlanmoqda...';

    try {
      const body = { title, content, author_id: Number(author_id) };

      if (editingId) {
        const res = await fetch(`${API}/${editingId}`, {
          method: 'PUT',
          headers: authHeaders(),
          body: JSON.stringify({ ...body, id: editingId })
        });
        if (handle401(res)) return;
        if (!res.ok) throw new Error();
        toast('✅ Post yangilandi!');
        cancelEdit();
      } else {
        const res = await fetch(`${API}/`, {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify(body)
        });
        if (handle401(res)) return;
        if (!res.ok) throw new Error();
        toast('✅ Post yaratildi!');
        clearPostForm();
      }
      loadPosts();
    } catch {
      toast('❌ Xatolik yuz berdi!', true);
    } finally {
      btn.disabled    = false;
      btn.textContent = editingId ? '💾 Saqlash' : '✚ Yaratish';
    }
  }

  async function deletePost(id) {
    if (!confirm("Bu postni o'chirishni xohlaysizmi?")) return;
    try {
      const res = await fetch(`${API}/${id}`, {
        method: 'DELETE',
        headers: authHeaders()
      });
      if (handle401(res)) return;
      toast("🗑 Post o'chirildi!");
      loadPosts();
    } catch {
      toast("❌ O'chirishda xatolik!", true);
    }
  }

  function startEdit(id, title, content, author_id) {
    editingId = id;
    document.getElementById('inp-title').value   = title;
    document.getElementById('inp-content').value = content;
    document.getElementById('inp-author').value  = author_id;
    document.getElementById('post-form-title').textContent = '✏️ Postni Tahrirlash';
    document.getElementById('post-btn').textContent        = '💾 Saqlash';
    document.getElementById('post-cancel').style.display  = 'flex';
    document.getElementById('sidebar').classList.add('editing');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cancelEdit() {
    editingId = null;
    clearPostForm();
    document.getElementById('post-form-title').textContent = '➕ Yangi Post';
    document.getElementById('post-btn').textContent        = '✚ Yaratish';
    document.getElementById('post-cancel').style.display  = 'none';
    document.getElementById('sidebar').classList.remove('editing');
  }

  function clearPostForm() {
    document.getElementById('inp-title').value   = '';
    document.getElementById('inp-content').value = '';
    document.getElementById('inp-author').value  = '';
    document.getElementById('post-err').style.display = 'none';
  }

  // ════════════════════════════════════════════════
  //  HELPERS
  // ════════════════════════════════════════════════
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escJs(s) {
    return String(s||'').replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
  }

  // ════════════════════════════════════════════════
  //  INIT — Sahifa yuklanganda token borligini tekshir
  // ════════════════════════════════════════════════
  (function init() {
    const token    = getToken();
    const username = localStorage.getItem('username') || 'User';

    if (token) {
      // Token muddatini tekshirish
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        if (payload.exp && payload.exp * 1000 < Date.now()) {
          // Token allaqachon eskirgan
          clearToken();
          return; // auth screen ko'rinadi
        }
        const msLeft = payload.exp * 1000 - Date.now();
        scheduleTokenExpiry(msLeft);
      } catch (e) { /* token o'qilmasa — auth screen */ clearToken(); return; }

      enterApp(username);
    }
    // Aks holda auth-screen default ko'rinadi
  })();
</script>
<script src="script.js"></script>
</body>
</html>
